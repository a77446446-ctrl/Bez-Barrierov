<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/logo.png?v=1" sizes="32x32" />
  <link rel="icon" type="image/png" href="/logo.png?v=1" sizes="192x192" />
  <link rel="apple-touch-icon" href="/logo.png?v=1" sizes="180x180" />
  <link rel="apple-touch-icon" href="/logo.png?v=1" />
  <link rel="preconnect" href="https://byjmvnxabbdezrdatmjl.supabase.co" crossorigin />
  <link rel="dns-prefetch" href="//byjmvnxabbdezrdatmjl.supabase.co" />
  <link rel="preconnect" href="https://api.mapbox.com" />
  <link rel="dns-prefetch" href="//api.mapbox.com" />
  <title>Без Барьеров — Сервис Сопровождения</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            careem: {
              dark: '#09090b',     // bg-zinc-950
              primary: '#2563EB',  // Sapphire Blue
              accent: '#3B82F6',   // Blue-500
              light: '#18181B',    // bg-zinc-900 (Surfaces)
              gray: '#27272A',     // bg-zinc-800 (Borders/Elements)
            }
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          borderRadius: {
            '4xl': '2.5rem',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
      background-color: #0A0A0A;
      color: rgba(255, 255, 255, 0.9);
    }

    h1,
    h2,
    h3,
    h4,
    .font-display {
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.01em;
    }

    /* Fix for Leaflet maps tiles conflict with Tailwind CSS */
    .leaflet-tile {
      max-width: none !important;
      max-height: none !important;
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Hide Leaflet attribution as requested */
    .leaflet-control-attribution {
      display: none !important;
    }

    /* Custom marker icons */
    .custom-marker-icon {
      display: flex !important;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      color: white;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 16px;
      border: 3px solid white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 0, 0, 0.1);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s;
    }

    .custom-marker-icon:hover {
      transform: scale(1.1);
      z-index: 1000 !important;
    }

    .marker-a {
      background: #004F32;
      /* Careem Dark Green */
      border-color: #ffffff;
    }

    .marker-b {
      background: #8B0000;
      /* Dark Red */
      color: white;
      border-color: #ffffff;
    }

    input[type="date"],
    input[type="time"] {
      color-scheme: dark;
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      opacity: 0.7;
      filter: invert(0.78);
      transform: scale(1.32);
      cursor: pointer;
    }

    /* Hide header when any modal is open */
    body:has(.modal-open) header {
      display: none !important;
    }
  </style>
</head>

<body class="bg-careem-dark text-slate-100">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((registration) => {
          console.log('SW registered: ', registration);
        }).catch((registrationError) => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>

</html>
